[tool.ruff]
line-length = 120
target-version = "py311"
exclude = ["venv", ".venv", "database", "logs"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line length handled by formatter, not a hard error
]

[tool.ruff.format]
quote-style = "double"
