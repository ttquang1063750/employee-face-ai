<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39d353" />
      <stop offset="100%" stop-color="#a3e635" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Outer hexagonal HUD ring -->
  <polygon points="50,5 89,27 89,73 50,95 11,73 11,27" fill="none" stroke="url(#neonGlow)" stroke-width="2" stroke-opacity="0.3"/>
  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="url(#neonGlow)" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Abstract Face scanning elements inside -->
  <!-- Eyes -->
  <circle cx="38" cy="42" r="3" fill="#39d353" filter="url(#glow)"/>
  <circle cx="62" cy="42" r="3" fill="#39d353" filter="url(#glow)"/>
  <!-- Target Reticle / Scanner lines overlaying eyes -->
  <path d="M 33 42 L 43 42 M 38 37 L 38 47" stroke="#39d353" stroke-width="1" stroke-opacity="0.8"/>
  <path d="M 57 42 L 67 42 M 62 37 L 62 47" stroke="#39d353" stroke-width="1" stroke-opacity="0.8"/>
  
  <!-- Face boundary box (HUD style brackets) -->
  <path d="M 28 35 L 23 35 L 23 45" stroke="#39d353" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 72 35 L 77 35 L 77 45" stroke="#39d353" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 28 65 L 23 65 L 23 55" stroke="#39d353" stroke-width="2" fill="none" filter="url(#glow)"/>
  <path d="M 72 65 L 77 65 L 77 55" stroke="#39d353" stroke-width="2" fill="none" filter="url(#glow)"/>

  <!-- Nose/mouth outline -->
  <path d="M 50 48 L 50 58 L 56 58" stroke="#39d353" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 40 68 Q 50 74 60 68" stroke="url(#neonGlow)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Diagonal scan line -->
  <line x1="18" y1="52" x2="82" y2="52" stroke="#39d353" stroke-width="1.5" filter="url(#glow)">
    <animate attributeName="y1" values="25;75;25" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="25;75;25" dur="3s" repeatCount="indefinite"/>
  </line>
</svg>
