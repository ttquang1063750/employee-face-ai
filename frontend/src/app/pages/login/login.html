<div class="login-container">
  <div class="glow-bg"></div>
  <app-language-switcher class="login-lang-switcher"></app-language-switcher>
  <div class="hud-login-box">
    <div class="hud-header">
      <div class="corner-dot top-left"></div>
      <div class="corner-dot top-right"></div>
      <img class="login-logo-img" src="logo.svg" alt="Employee Face AI Logo" />
      <h2 class="title">{{ 'login.title' | translate }}</h2>
      <p class="subtitle">{{ 'login.subtitle' | translate }}</p>
    </div>

    @if (errorMsg()) {
      <div class="alert-box error">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text">{{ errorMsg() }}</span>
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="emp-username">{{ 'login.username' | translate }}</label>
        <div class="input-wrapper">
          <input
            type="text"
            id="emp-username"
            formControlName="username"
            [placeholder]="'login.usernamePlaceholder' | translate"
            autocomplete="username"
            class="hud-input"
          />
          <span class="input-glow"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="emp-password">{{ 'login.password' | translate }}</label>
        <div class="input-wrapper">
          <input
            type="password"
            id="emp-password"
            formControlName="password"
            placeholder="••••••••"
            class="hud-input"
          />
          <span class="input-glow"></span>
        </div>
      </div>

      <button type="submit" class="hud-btn-primary" [disabled]="isLoading()">
        @if (isLoading()) {
          <div class="loader"></div>
          <span>{{ 'login.submitting' | translate }}</span>
        } @else {
          <span>{{ 'login.submit' | translate }}</span>
        }
      </button>
    </form>

    <div class="hud-footer">
      <div class="corner-dot bottom-left"></div>
      <div class="corner-dot bottom-right"></div>
      <a class="kiosk-link" href="/kiosk">{{ 'login.backToKiosk' | translate }}</a>
    </div>
  </div>
</div>
