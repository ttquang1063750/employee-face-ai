<div class="widget-card"
     [class.kind-success]="kind() === 'success'"
     [class.kind-warning]="kind() === 'warning'"
     [class.kind-danger]="kind() === 'danger'">
  @if (loading()) {
    <div class="widget-top-row">
      <div class="hud-skeleton skel-chip"></div>
      <div class="hud-skeleton skel-status"></div>
    </div>
    <div class="hud-skeleton skel-label"></div>
    <div class="hud-skeleton skel-value"></div>
    <div class="hud-skeleton skel-footer"></div>
  } @else {
    <div class="widget-top-row">
      <div class="widget-chip">{{ icon() }}</div>
      @if (filterOptions().length > 0) {
        <select class="pag-size-select" [value]="filterValue()" (change)="onFilterChange($event)">
          @for (opt of filterOptions(); track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      } @else if (statusLabel()) {
        <span class="widget-status">{{ statusLabel() }}</span>
      }
    </div>
    <div class="widget-label">{{ label() }}</div>
    <div class="widget-value">{{ value() }}</div>
    <div class="widget-footer">{{ footer() }}</div>
  }
</div>
