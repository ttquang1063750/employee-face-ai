<div class="dashboard-layout">
  <div class="dashboard-content">
    @if (errorMsg()) {
      <div class="error-state">
        <p class="err-text">⚠️ {{ errorMsg() }}</p>
        <button class="retry-btn" (click)="loadDashboardData()">Thử lại</button>
      </div>
    } @else {
      <!-- 0. Global filter bar — every widget below reacts to this -->
      <div class="hud-filter-bar">
        <div class="hud-field">
          <span class="hud-label">TỪ NGÀY</span>
          <app-date-picker [ngModel]="filterStartDateInput()" (ngModelChange)="filterStartDateInput.set($event)"></app-date-picker>
        </div>
        <div class="hud-field">
          <span class="hud-label">ĐẾN NGÀY</span>
          <app-date-picker [ngModel]="filterEndDateInput()" (ngModelChange)="filterEndDateInput.set($event)"></app-date-picker>
        </div>
        <div class="hud-field filter-apply-field">
          <button class="hud-btn-outline" (click)="applyDateFilter()">ÁP DỤNG</button>
        </div>

        <!-- Autocomplete employee name search -->
        <div class="hud-field grow-3">
          <label class="hud-label" for="dashboard-employee-search">TÊN NHÂN VIÊN</label>
          <div class="hud-autocomplete">
            <div class="hud-search-wrapper">
              <input
                id="dashboard-employee-search"
                type="text"
                [ngModel]="filterEmployeeName()"
                (ngModelChange)="onSearchInput($event)"
                (focus)="showSuggestions.set(true)"
                (blur)="closeSuggestions()"
                placeholder="Tìm kiếm tên nhân viên..."
                class="hud-search-input"
                autocomplete="off">
            </div>
            @if (showSuggestions() && employeeSuggestions().length > 0) {
              <ul class="hud-autocomplete-list">
                @for (name of employeeSuggestions(); track name) {
                  <li class="hud-autocomplete-item" (mousedown)="selectSuggestion(name)">
                    <span class="ac-icon">👤</span>
                    <span class="ac-name">{{ name }}</span>
                  </li>
                }
              </ul>
            }
          </div>
        </div>
      </div>

      <!-- 1. Stats Widgets Grid -->
      <div class="stats-grid">
        <app-stat-widget
          icon="Σ"
          label="TỔNG NHÂN SỰ"
          [value]="totalEmployees()"
          footer="Active Accounts"
          [loading]="isLoading()" />
        <app-stat-widget
          icon="✓"
          label="LƯỢT CHẤM CÔNG"
          [value]="totalLogsInRange()"
          footer="Lượt quét trong khoảng đã chọn"
          [loading]="isLoading()" />
        <app-stat-widget
          icon="☺"
          label="CHỈ SỐ HẠNH PHÚC"
          [value]="hasMoodData() ? moodStats().happy + '%' : '--'"
          footer="Cảm xúc tích cực · mục tiêu ≥ 60%"
          [statusLabel]="happinessStatusLabel()"
          [kind]="happinessLevel()"
          [loading]="isLoading()" />
      </div>

      <!-- 2. Charts Section -->
      <div class="charts-row">
        <app-hourly-chart
          [points]="hourlyTimeline().points"
          [hasData]="hasHourlyData()"
          [loading]="isLoading()" />
        <app-mood-donut
          [segments]="moodDonut()"
          [hasData]="hasMoodData()"
          [loading]="isLoading()" />
      </div>

      <!-- 3. Logs Audit Grid -->
      <app-logs-table
        [logs]="paginatedLogs()"
        [totalCount]="filteredLogs().length"
        [currentPage]="currentPage()"
        [totalPages]="totalPages()"
        [pageSize]="pageSize()"
        [loading]="isLoading()"
        (prevPage)="prevPage()"
        (nextPage)="nextPage()"
        (pageSizeChange)="onPageSizeChange($event)"
        (exportCsv)="exportCSV()" />
    }
  </div>
</div>
