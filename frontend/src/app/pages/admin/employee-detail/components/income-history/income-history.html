<div class="lifecycle-card">
  <div class="section-header-row">
    <h3 class="section-title">{{ 'incomeHistory.title' | translate }}</h3>
    <button
      class="hud-btn-mini"
      (click)="openModal()"
      [attr.data-tooltip]="'incomeHistory.addTooltip' | translate"
    >
      ⚙️
    </button>
  </div>
  <div class="comp-list">
    @for (inc of incomeHistory(); track inc.id) {
      <div class="comp-item">
        <div class="comp-amount text-glow-green">
          <span>${{ inc.amount }} / month</span>
          <button
            class="remove-inline-btn"
            (click)="deleteIncome(inc.id)"
            [attr.title]="'incomeHistory.deleteTooltip' | translate"
          >
            ✖
          </button>
        </div>
        <div class="comp-details">
          <span class="reason">{{ inc.change_reason }}</span>
          <span class="date">📅 {{ inc.effective_date }}</span>
        </div>
      </div>
    }
  </div>
</div>

@if (showModal()) {
  <div class="modal-backdrop">
    <div class="modal-card mini">
      <div class="modal-header">
        <h3>{{ 'incomeHistory.modalTitle' | translate }}</h3>
        <button class="close-btn" (click)="closeModal()">✖</button>
      </div>
      <div class="modal-body" [formGroup]="newIncomeForm">
        <div class="form-fields">
          <div class="form-group">
            <label for="new-inc-amount">{{ 'incomeHistory.amountLabel' | translate }}</label>
            <input
              id="new-inc-amount"
              type="number"
              formControlName="amount"
              [placeholder]="'incomeHistory.amountPlaceholder' | translate"
              class="hud-input"
            />
          </div>
          <div class="form-group">
            <span>{{ 'incomeHistory.effectiveDateLabel' | translate }}</span>
            <app-date-picker formControlName="effectiveDate"></app-date-picker>
          </div>
          <div class="form-group">
            <label for="new-inc-reason">{{ 'incomeHistory.reasonLabel' | translate }}</label>
            <input
              id="new-inc-reason"
              type="text"
              formControlName="reason"
              [placeholder]="'incomeHistory.reasonPlaceholder' | translate"
              class="hud-input"
            />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          class="hud-btn-success"
          [disabled]="isSaving() || newIncomeForm.controls.amount.value <= 0"
          (click)="save()"
        >
          @if (isSaving()) {
            <div class="loader"></div>
          }
          <span>{{ 'incomeHistory.submit' | translate }}</span>
        </button>
        <button class="hud-btn-secondary" (click)="closeModal()">
          {{ 'incomeHistory.cancel' | translate }}
        </button>
      </div>
    </div>
  </div>
}
