<div class="dashboard-layout">
  <div class="dashboard-content">
    <div class="page-title-row">
      <h2 class="title">
        <app-icon class="title-icon">pencil</app-icon>

        {{
          isEditMode()
            ? ('templateForm.editTitle' | translate)
            : ('templateForm.newTitle' | translate)
        }}
      </h2>
    </div>

    @if (isLoading()) {
      <div class="hud-loading-state">
        <div class="hud-spinner"></div>
        <p>{{ 'templateForm.loading' | translate }}</p>
      </div>
    } @else {
      <div class="logs-card" [formGroup]="form">
        <div class="form-fields">
          <div class="form-group">
            <label for="template-category">{{ 'templateForm.typeLabel' | translate }}</label>
            <app-hud-select
              [selectId]="'template-category'"
              [options]="categoryOptions()"
              formControlName="category"
            ></app-hud-select>
          </div>
          <div class="form-group">
            <label for="template-name">{{ 'templateForm.nameLabel' | translate }}</label>
            <input
              id="template-name"
              type="text"
              formControlName="name"
              [placeholder]="'templateForm.namePlaceholder' | translate"
              class="hud-input"
            />
          </div>
          <div class="form-group">
            <label for="template-content">{{ 'templateForm.contentLabel' | translate }}</label>
            <app-rich-text-editor
              [editorId]="'template-content'"
              formControlName="content"
            ></app-rich-text-editor>
          </div>
        </div>

        <div class="form-actions">
          <button
            type="button"
            class="hud-btn-primary"
            [disabled]="form.invalid || isSaving()"
            (click)="save()"
          >
            {{
              isSaving() ? ('templateForm.saving' | translate) : ('templateForm.save' | translate)
            }}
          </button>
          <button type="button" class="hud-btn-outline" (click)="cancel()">
            {{ 'templateForm.cancel' | translate }}
          </button>
        </div>
      </div>
    }
  </div>
</div>
