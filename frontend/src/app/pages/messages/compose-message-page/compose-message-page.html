<div class="dashboard-layout">
  <div class="dashboard-content">
    <div class="page-title-row">
      <h2 class="title">
        <app-icon class="title-icon">pencil</app-icon>

        SOẠN TIN NHẮN MỚI
      </h2>
    </div>

    <div class="logs-card" [formGroup]="form">
      <div class="form-fields">
        <div class="form-group">
          <label for="compose-recipient">NGƯỜI NHẬN</label>
          <app-hud-autocomplete
            [inputId]="'compose-recipient'"
            [formControl]="recipientQueryControl"
            [suggestions]="recipientSuggestions()"
            [itemLabel]="recipientLabel"
            [itemMeta]="recipientMeta"
            placeholder="Tìm kiếm theo tên nhân viên..."
            (optionSelected)="selectRecipient($event)"
          ></app-hud-autocomplete>
          @if (selectedRecipient(); as recipient) {
            <p class="selected-recipient">
              Gửi đến: <strong>{{ recipient.name }}</strong>
              <button type="button" class="link-btn" (click)="clearRecipient()">Đổi</button>
            </p>
          }
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="compose-category">LOẠI TIN NHẮN</label>
            <app-hud-select
              [selectId]="'compose-category'"
              [options]="categoryOptions"
              formControlName="category"
            ></app-hud-select>
          </div>
          <div class="form-group">
            <label for="compose-template">MẪU CÓ SẴN (TÙY CHỌN)</label>
            <app-hud-select
              [selectId]="'compose-template'"
              [options]="templateSelectOptions()"
              placeholder="-- Không dùng mẫu --"
              formControlName="templateId"
            ></app-hud-select>
          </div>
        </div>

        <div class="form-group">
          <label for="compose-subject">TIÊU ĐỀ</label>
          <input
            id="compose-subject"
            type="text"
            formControlName="subject"
            placeholder="VD: Báo cáo công việc ngày 20/07/2026"
            class="hud-input"
          />
        </div>

        <div class="form-group">
          <label for="compose-content">NỘI DUNG</label>
          <app-rich-text-editor
            [editorId]="'compose-content'"
            formControlName="content"
          ></app-rich-text-editor>
        </div>
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="hud-btn-primary"
          [disabled]="!canSubmit() || isSubmitting()"
          (click)="submit()"
        >
          {{ isSubmitting() ? 'ĐANG GỬI...' : '📤 GỬI TIN NHẮN' }}
        </button>
        <button type="button" class="hud-btn-outline" (click)="cancel()">HỦY</button>
      </div>
    </div>
  </div>
</div>
