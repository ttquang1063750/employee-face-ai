<div class="dashboard-layout">
  <div class="dashboard-content">
    <div class="page-title-row">
      <h2 class="title">
        <app-icon class="title-icon">pencil</app-icon>

        {{ 'compose.pageTitle' | translate }}
      </h2>
    </div>

    <div class="logs-card" [formGroup]="form">
      <div class="form-fields">
        <div class="form-group">
          <label for="compose-recipient">{{ 'compose.recipientLabel' | translate }}</label>
          <app-hud-autocomplete
            [inputId]="'compose-recipient'"
            [formControl]="recipientQueryControl"
            [suggestions]="recipientSuggestions()"
            [itemLabel]="recipientLabel"
            [itemMeta]="recipientMeta"
            [placeholder]="'compose.recipientSearchPlaceholder' | translate"
            (optionSelected)="selectRecipient($event)"
          ></app-hud-autocomplete>
          @if (selectedRecipient(); as recipient) {
            <p class="selected-recipient">
              {{ 'compose.sendTo' | translate }} <strong>{{ recipient.name }}</strong>
              <button type="button" class="link-btn" (click)="clearRecipient()">
                {{ 'compose.change' | translate }}
              </button>
            </p>
          }
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="compose-category">{{ 'compose.categoryLabel' | translate }}</label>
            <app-hud-select
              [selectId]="'compose-category'"
              [options]="categoryOptions()"
              formControlName="category"
            ></app-hud-select>
          </div>
          <div class="form-group">
            <label for="compose-template">{{ 'compose.templateLabel' | translate }}</label>
            <app-hud-select
              [selectId]="'compose-template'"
              [options]="templateSelectOptions()"
              [placeholder]="'compose.noTemplate' | translate"
              formControlName="templateId"
            ></app-hud-select>
          </div>
        </div>

        <div class="form-group">
          <label for="compose-subject">{{ 'compose.subjectLabel' | translate }}</label>
          <input
            id="compose-subject"
            type="text"
            formControlName="subject"
            [placeholder]="'compose.subjectPlaceholder' | translate"
            class="hud-input"
          />
        </div>

        <div class="form-group">
          <label for="compose-content">{{ 'compose.contentLabel' | translate }}</label>
          <app-rich-text-editor
            [editorId]="'compose-content'"
            formControlName="content"
          ></app-rich-text-editor>
        </div>
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="hud-btn-primary"
          [disabled]="!canSubmit() || isSubmitting()"
          (click)="submit()"
        >
          {{ isSubmitting() ? ('compose.sending' | translate) : ('compose.send' | translate) }}
        </button>
        <button type="button" class="hud-btn-outline" (click)="cancel()">
          {{ 'compose.cancel' | translate }}
        </button>
      </div>
    </div>
  </div>
</div>
