<div class="modal-backdrop">
  <div class="modal-card full">
    <div class="modal-header">
      <h3>{{ 'shapeDrawing.title' | translate }}</h3>
      <button class="close-btn" (click)="cancel()">✖</button>
    </div>
    <div class="modal-body">
      <div class="shape-toolbar">
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.undo' | translate"
          [disabled]="!canUndo()"
          (click)="undo()"
        >
          ↺
        </button>
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.redo' | translate"
          [disabled]="!canRedo()"
          (click)="redo()"
        >
          ↻
        </button>

        <span class="shape-toolbar-divider"></span>

        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.selectMove' | translate"
          [class.active]="activeTool() === 'select'"
          (click)="selectTool('select')"
        >
          ↖
        </button>
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.rectangle' | translate"
          [class.active]="activeTool() === 'rectangle'"
          (click)="selectTool('rectangle')"
        >
          ▭
        </button>
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.ellipse' | translate"
          [class.active]="activeTool() === 'ellipse'"
          (click)="selectTool('ellipse')"
        >
          ◯
        </button>
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.line' | translate"
          [class.active]="activeTool() === 'line'"
          (click)="selectTool('line')"
        >
          ╱
        </button>
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.arrow' | translate"
          [class.active]="activeTool() === 'arrow'"
          (click)="selectTool('arrow')"
        >
          ➚
        </button>
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.insertText' | translate"
          (click)="selectTool('text')"
        >
          T
        </button>
        <button
          type="button"
          class="hud-btn-mini"
          [attr.data-tooltip]="'shapeDrawing.crop' | translate"
          [class.active]="activeTool() === 'crop'"
          (click)="selectTool('crop')"
        >
          ⛶
        </button>

        <span class="shape-toolbar-divider"></span>

        @for (color of colors; track color) {
          <button
            type="button"
            class="shape-color-swatch"
            [class.active]="strokeColor() === color"
            [style.background]="color"
            [attr.data-tooltip]="color"
            [attr.aria-label]="('shapeDrawing.chooseColorPrefix' | translate) + ' ' + color"
            (click)="chooseSwatch(color)"
          ></button>
        }
        <button
          type="button"
          class="hud-btn-mini shape-color-picker"
          [attr.data-tooltip]="'shapeDrawing.customColor' | translate"
          (click)="triggerColorPicker()"
        >
          🖌️
          <span class="shape-color-picker-indicator" [style.background]="strokeColor()"></span>
        </button>
        <input
          #colorPickerInput
          type="color"
          [value]="strokeColor()"
          (input)="onColorPicked($event)"
          (change)="onColorCommitted()"
          class="visually-hidden-input"
        />

        <span class="shape-toolbar-divider"></span>

        <button
          type="button"
          class="hud-btn-mini danger"
          [attr.data-tooltip]="'shapeDrawing.deleteSelection' | translate"
          (click)="deleteSelected()"
        >
          🗑
        </button>
        @if (hasCrop()) {
          <button
            type="button"
            class="hud-btn-mini"
            [attr.data-tooltip]="'shapeDrawing.applyCrop' | translate"
            (click)="applyCrop()"
          >
            ⛶✔
          </button>
          <button
            type="button"
            class="hud-btn-mini danger"
            [attr.data-tooltip]="'shapeDrawing.discardCrop' | translate"
            (click)="clearCrop()"
          >
            ⛶✖
          </button>
        }
        <button
          type="button"
          class="hud-btn-mini danger"
          [attr.data-tooltip]="'shapeDrawing.clearAll' | translate"
          (click)="clearCanvas()"
        >
          ⟲
        </button>
      </div>

      <div #canvasWrapper class="shape-canvas-wrapper">
        <canvas #canvasHost class="shape-canvas"></canvas>
      </div>
    </div>
    <div class="modal-footer">
      <button class="hud-btn-success" [disabled]="isUploading()" (click)="insertIntoContent()">
        @if (isUploading()) {
          <div class="loader"></div>
        }
        <span>{{ 'shapeDrawing.insertIntoContent' | translate }}</span>
      </button>
      <button class="hud-btn-secondary" (click)="cancel()">
        {{ 'shapeDrawing.cancel' | translate }}
      </button>
    </div>
  </div>
</div>
