<button
  type="button"
  class="hud-btn-mini"
  [attr.data-tooltip]="'auditPhoto.viewTooltip' | translate"
  [disabled]="!imagePath() || isLoading()"
  (click)="view()"
>
  @if (isLoading()) {
    <div class="loader"></div>
  } @else {
    🖼️
  }
</button>

@if (loadFailed()) {
  <span class="audit-photo-error" [attr.title]="'auditPhoto.loadFailed' | translate">⚠️</span>
}

@if (photoUrl(); as url) {
  <div class="modal-backdrop">
    <div class="modal-card mini">
      <div class="modal-header">
        <h3>{{ 'auditPhoto.modalTitle' | translate }}</h3>
        <button class="close-btn" (click)="close()">✖</button>
      </div>
      <div class="modal-body">
        <img [src]="url" [attr.alt]="'auditPhoto.imageAlt' | translate" class="audit-photo-full" />
      </div>
    </div>
  </div>
}
