name: employee-face-ai

services:
  db:
    image: postgres:15-alpine
    container_name: employee-face-ai-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: employee_face_ai
    ports:
      - "5432:5432"
    volumes:
      - employee_face_ai_pgdata:/var/lib/postgresql/data

volumes:
  employee_face_ai_pgdata:
